test:
  name: TimeBank Benchmark - 2 Workers
  description: Benchmarking all TimeBank operations with 2 workers

  workers:
    number: 50

  rounds:
    - label: "50w-CreateUser-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 20 } }
      workload: { module: workload/createUser.js }

    - label: "50w-PostService-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 20 } }
      workload: { module: workload/postService.js }

    - label: "50w-FullFlow-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 10 } }
      workload: { module: workload/matchAndComplete.js }

    - label: "50w-CreateUser-200tx"
