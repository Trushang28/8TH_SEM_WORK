test:
  name: TimeBank Benchmark - 1 Worker
  description: Benchmarking all TimeBank operations

  workers:
    number: 1

  rounds:
    - label: "1w-CreateUser-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 10 } }
      workload: { module: workload/createUser.js }

    - label: "1w-PostService-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 10 } }
      workload: { module: workload/postService.js }

    - label: "1w-FullFlow-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 5 } }
      workload: { module: workload/matchAndComplete.js }

