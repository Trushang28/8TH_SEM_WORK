test:
  name: TimeBank Benchmark - 4 Workers
  description: Benchmarking all TimeBank operations with 4 workers

  workers:
    number: 4

  rounds:
    - label: "4w-CreateUser-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 40 } }
      workload: { module: workload/createUser.js }

    - label: "4w-PostService-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 40 } }
      workload: { module: workload/postService.js }

    - label: "4w-FullFlow-100tx"
      txNumber: 100
      rateControl: { type: fixed-rate, opts: { tps: 20 } }
      workload: { module: workload/matchAndComplete.js }

    - label: "4w-CreateUser-200tx"
