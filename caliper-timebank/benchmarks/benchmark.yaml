test:
  name: TimeBank Worker Scaling Test
  description: Finding max throughput by increasing workers

  workers:
    number: 75

  rounds:
    - label: "CreateUser"
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/createUser.js

    - label: "PostService"
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workload/postService.js

    - label: "FullFlow"
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 20
      workload:
        module: workload/matchAndComplete.js

monitors:
  resource:
     - module: docker
       options:
         interval: 5
         containers:
           - all